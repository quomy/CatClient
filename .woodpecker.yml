variables:
  - &fast_build_env
    environment:
      VERSION:
        from_secret: VERSION
      CARGO_HTTP_MULTIPLEXING: "false"

when:
  - event: push
    branch:
      exclude:
        - gh-readonly-queue/**
  - event: manual

clone:
  git:
    image: woodpeckerci/plugin-git
    settings:
      recursive: true

steps:
  build-linux:
    image: ubuntu:22.04
    <<: *fast_build_env
    commands:
      - apt-get update -y
      - DEBIAN_FRONTEND=noninteractive apt-get install -y pkg-config cmake ninja-build libfreetype6-dev libnotify-dev libsdl2-dev libsqlite3-dev libvulkan-dev glslang-tools spirv-tools libavcodec-dev libavformat-dev libavutil-dev libswresample-dev libswscale-dev libx264-dev libpng-dev valgrind gcovr libglew-dev curl ca-certificates git python3 python3-pip unzip
      - curl https://sh.rustup.rs -sSf | sh -s -- -y
      - . "$HOME/.cargo/env"
      - curl -L -o /tmp/vulkan-sdk-linux.tar.xz https://sdk.lunarg.com/sdk/download/1.3.296.0/linux/vulkansdk-linux-x86_64-1.3.296.0.tar.xz
      - mkdir -p /opt/vulkan-sdk
      - tar -xJf /tmp/vulkan-sdk-linux.tar.xz -C /opt/vulkan-sdk
      - printf '%s' "$VERSION" | base64 -d > "$CI_WORKSPACE/versioninfo.h"
      - mkdir -p release
      - cd release
      - CXXFLAGS="-include$CI_WORKSPACE/versioninfo.h" cmake -G Ninja -DCMAKE_BUILD_TYPE=Release -DDISCORD=ON -DDISCORD_DYNAMIC=ON -DWEBSOCKETS=OFF -DPREFER_BUNDLED_LIBS=ON -DAUTOUPDATE=ON -DDOWNLOAD_GTEST=ON -DCMAKE_RUNTIME_OUTPUT_DIRECTORY_RELEASE=. ..
      - cmake --build . --config Release --target everything
      - cmake --build . --config Release --target package_default

  build-macos:
    <<: *fast_build_env
    labels:
      platform: darwin
    commands:
      - brew update || true
      - brew install pkg-config ninja molten-vk vulkan-headers glslang spirv-tools glew googletest libpng molten-vk opusfile wavpack x264 libjpeg || true
      - brew upgrade freetype
      - pip3 install --break-system-packages dmgbuild
      - rustup default stable
      - rustup update
      - rustup target add x86_64-apple-darwin aarch64-apple-darwin
      - printf '%s' "$VERSION" | base64 -d > "$CI_WORKSPACE/versioninfo.h"
      - rm -rf /Library/Developer/CommandLineTools || true
      - mkdir -p release
      - cd release
      - CXXFLAGS="-include$CI_WORKSPACE/versioninfo.h" cmake -G Ninja -DCMAKE_BUILD_TYPE=Release -DDISCORD=ON -DWEBSOCKETS=OFF -DPREFER_BUNDLED_LIBS=ON -DCMAKE_OSX_ARCHITECTURES=arm64 -DCMAKE_OSX_DEPLOYMENT_TARGET=11.0 -DCMAKE_SYSTEM_IGNORE_PATH=/usr/lib -DCMAKE_FIND_FRAMEWORK=LAST -DAUTOUPDATE=OFF -DPNG_LIBRARY="$CI_WORKSPACE/ddnet-libs/png/mac/libfat/libpng16.16.dylib" -DPNG_INCLUDEDIR="$CI_WORKSPACE/ddnet-libs/png/include" -DDOWNLOAD_GTEST=ON -DCMAKE_RUNTIME_OUTPUT_DIRECTORY_RELEASE=. ..
      - cmake --build . --config Release --target everything
      - cmake --build . --config Release --target package_default

  build-windows:
    <<: *fast_build_env
    labels:
      platform: windows
    commands:
      - rustup default stable
      - printf '%s' "$VERSION" | base64 -d > "$CI_WORKSPACE/versioninfo.h"
      - mkdir -p release
      - cd release
      - export MSYS_ARG_CONV_EXCL="/FI"
      - cmake -A x64 -DDISCORD=ON -DTOOLS=OFF -DAUTOUPDATE=ON -DVULKAN=ON -DCMAKE_CXX_FLAGS="/FI$CI_WORKSPACE/versioninfo.h" -DDOWNLOAD_GTEST=ON -DCMAKE_RUNTIME_OUTPUT_DIRECTORY_RELEASE=. ..
      - cmake --build . --config Release --target everything
      - cmake --build . --config Release --target package_default
