variables:
  - &fast_build_env
    environment:
      VERSION:
        from_secret: VERSION
      CARGO_HTTP_MULTIPLEXING: "false"

when:
  - event: push
    branch:
      exclude:
        - gh-readonly-queue/**
  - event: manual

clone:
  git:
    image: woodpeckerci/plugin-git
    settings:
      recursive: true

steps:
  build-linux:
    image: ubuntu:22.04
    <<: *fast_build_env
    commands:
      - apt-get update -y
      - DEBIAN_FRONTEND=noninteractive apt-get install -y pkg-config cmake ninja-build libfreetype6-dev libnotify-dev libsdl2-dev libsqlite3-dev libvulkan-dev glslang-tools spirv-tools libavcodec-dev libavformat-dev libavutil-dev libswresample-dev libswscale-dev libx264-dev libpng-dev valgrind gcovr libglew-dev curl ca-certificates git python3 python3-pip unzip
      - curl https://sh.rustup.rs -sSf | sh -s -- -y
      - . "$HOME/.cargo/env"
      - curl -L -o /tmp/vulkan-sdk-linux.tar.xz https://sdk.lunarg.com/sdk/download/1.3.296.0/linux/vulkansdk-linux-x86_64-1.3.296.0.tar.xz
      - mkdir -p /opt/vulkan-sdk
      - tar -xJf /tmp/vulkan-sdk-linux.tar.xz -C /opt/vulkan-sdk
      - printf '%s' "$VERSION" | base64 -d > "$CI_WORKSPACE/versioninfo.h"
      - mkdir -p release
      - cd release
      - CXXFLAGS="-include$CI_WORKSPACE/versioninfo.h" cmake -G Ninja -DCMAKE_BUILD_TYPE=Release -DDISCORD=ON -DDISCORD_DYNAMIC=ON -DWEBSOCKETS=OFF -DPREFER_BUNDLED_LIBS=ON -DAUTOUPDATE=ON -DDOWNLOAD_GTEST=ON -DCMAKE_RUNTIME_OUTPUT_DIRECTORY_RELEASE=. ..
      - cmake --build . --config Release --target everything
      - cmake --build . --config Release --target package_default
