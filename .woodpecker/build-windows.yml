variables:
  - &fast_build_env
    environment:
      CARGO_HTTP_MULTIPLEXING: "false"

when:
  - event: push
    branch:
      exclude:
        - gh-readonly-queue/**
  - event: manual

labels:
  platform: windows

clone:
  git:
    image: woodpeckerci/plugin-git
    settings:
      recursive: true

steps:
  build-windows:
    image: bash
    <<: *fast_build_env
    commands:
      - rustup default stable
      - mkdir -p release
      - cd release
      - export MSYS_ARG_CONV_EXCL="/FI"
      - cmake -A x64 -DDISCORD=ON -DTOOLS=OFF -DAUTOUPDATE=ON -DVULKAN=ON -DDOWNLOAD_GTEST=ON -DCMAKE_RUNTIME_OUTPUT_DIRECTORY_RELEASE=. ..
      - cmake --build . --config Release --target everything
      - cmake --build . --config Release --target package_default
